<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>NageurStats — FFN Tracker</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=JetBrains+Mono:wght@600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-1: #03142e;
    --bg-2: #082858;
    --aqua: #38e1ff;
    --aqua-2: #00b8d4;
    --gold: #ffd166;
    --silver: #cbd5e1;
    --bronze: #d97706;
    --pink: #f472b6;
    --blue: #60a5fa;
    --purple: #a78bfa;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { overflow-x: hidden; }
  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: var(--bg-1);
    color: #e2e8f0; min-height: 100vh;
    position: relative;
  }

  /* Animated wave background */
  .waves {
    position: fixed; inset: 0; z-index: 0; overflow: hidden;
    background: radial-gradient(ellipse at top, var(--bg-2), var(--bg-1) 70%);
  }
  .waves::before, .waves::after {
    content: ''; position: absolute; left: -50%; width: 200%; height: 200px;
    background: radial-gradient(ellipse, rgba(56,225,255,0.15), transparent 70%);
    border-radius: 50%;
    animation: wave 14s ease-in-out infinite;
  }
  .waves::before { top: 20%; }
  .waves::after { top: 60%; animation-delay: -7s; opacity: 0.6; }
  @keyframes wave {
    0%,100% { transform: translateX(0) scaleY(1); }
    50% { transform: translateX(10%) scaleY(1.2); }
  }

  /* Vagues SVG */
  .wave-svg {
    position: fixed; left: 0; width: 100%; height: 180px;
    z-index: 1; pointer-events: none;
  }
  .wave-top { top: 0; }
  .wave-bottom { bottom: 0; transform: scaleY(-1); }
  .w-path { animation: waveMove 12s ease-in-out infinite; transform-origin: center; }
  .w-path.w2 { animation-duration: 18s; animation-delay: -4s; opacity: 0.7; }
  @keyframes waveMove {
    0%,100% { transform: translateX(0) scaleX(1); }
    50%     { transform: translateX(-30px) scaleX(1.05); }
  }

  /* Spotlight (suit le curseur) */
  .spotlight {
    position: relative;
  }
  .spotlight::before {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(360px circle at var(--mx, 50%) var(--my, 50%),
      rgba(56,225,255,0.15), transparent 60%);
    pointer-events: none; opacity: 0;
    transition: opacity 0.3s; border-radius: inherit;
  }
  .spotlight:hover::before { opacity: 1; }

  /* 3D tilt swimmer card */
  .tiltable {
    transition: transform 0.4s cubic-bezier(.2,.7,.2,1);
    transform-style: preserve-3d;
    will-change: transform;
  }

  /* Élite legendary border + particules */
  .elite-aura {
    position: relative;
  }
  .elite-aura::after {
    content: ''; position: absolute; inset: -2px;
    border-radius: 26px;
    padding: 2px;
    background: conic-gradient(from 0deg, #ffd166, #f472b6, #38e1ff, #a78bfa, #ffd166);
    -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    -webkit-mask-composite: xor; mask-composite: exclude;
    animation: rotateGrad 6s linear infinite;
    pointer-events: none;
  }
  @keyframes rotateGrad {
    to { transform: rotate(360deg); }
  }
  .gold-particle {
    position: fixed; top: -10px; pointer-events: none; z-index: 5;
    color: #ffd166; font-size: 14px;
    animation: fall linear forwards;
    text-shadow: 0 0 8px rgba(255,209,102,0.7);
  }
  @keyframes fall {
    0% { transform: translateY(0) rotate(0); opacity: 0; }
    10% { opacity: 1; }
    100% { transform: translateY(110vh) rotate(540deg); opacity: 0; }
  }

  /* Bubbles */
  .bubble {
    position: fixed; bottom: -50px; background: rgba(56,225,255,0.12);
    border-radius: 50%; pointer-events: none; z-index: 1;
    animation: rise linear infinite;
    border: 1px solid rgba(56,225,255,0.2);
  }
  @keyframes rise {
    0% { transform: translateY(0) translateX(0); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% { transform: translateY(-110vh) translateX(40px); opacity: 0; }
  }

  .container { position: relative; z-index: 2; max-width: 1200px; margin: 0 auto; padding: 32px 24px 80px; }

  header { text-align: center; margin-bottom: 40px; padding-top: 30px; }
  @media (max-width: 768px) { header { padding-top: 50px; } }
  .logo {
    display: inline-flex; align-items: center; gap: 12px;
    font-size: 2.8rem; font-weight: 900; letter-spacing: -0.02em;
    background: linear-gradient(120deg, #fff 0%, var(--aqua) 50%, var(--aqua-2) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .logo-icon { font-size: 2.4rem; filter: drop-shadow(0 0 12px var(--aqua)); }
  .tagline { color: #94a3b8; margin-top: 8px; font-size: 1rem; }

  /* Search */
  .search-wrap { position: relative; max-width: 720px; margin: 0 auto 32px; }
  .search-box {
    position: relative;
    background: rgba(8,40,88,0.6);
    backdrop-filter: blur(16px);
    border: 1px solid rgba(56,225,255,0.25);
    border-radius: 18px;
    transition: all 0.3s;
  }
  .search-box:focus-within {
    border-color: var(--aqua);
    box-shadow: 0 0 0 4px rgba(56,225,255,0.15), 0 8px 32px rgba(56,225,255,0.2);
  }
  .search-box input {
    width: 100%; padding: 18px 22px 18px 56px; font-size: 1.05rem;
    background: transparent; border: none; outline: none;
    color: #fff; font-family: inherit;
  }
  .search-box input::placeholder { color: #64748b; }
  .search-icon {
    position: absolute; left: 20px; top: 50%; transform: translateY(-50%);
    color: var(--aqua); font-size: 1.2rem;
  }
  .suggestions {
    position: absolute; top: calc(100% + 6px); left: 0; right: 0;
    background: rgba(8,30,68,0.95);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(56,225,255,0.2);
    border-radius: 14px;
    max-height: 380px; overflow-y: auto;
    z-index: 100; display: none;
    box-shadow: 0 16px 48px rgba(0,0,0,0.5);
  }
  .suggestions.active { display: block; animation: slideDown 0.2s ease-out; }
  @keyframes slideDown { from { opacity:0; transform: translateY(-8px); } to { opacity:1; transform: translateY(0); } }
  .suggestion {
    display: flex; align-items: center; gap: 14px;
    padding: 12px 18px; cursor: pointer;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    transition: background 0.15s;
  }
  .suggestion:hover { background: rgba(56,225,255,0.08); }
  .suggestion:last-child { border-bottom: none; }
  .avatar {
    width: 40px; height: 40px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; flex-shrink: 0; font-size: 1rem;
  }
  .avatar.h { background: linear-gradient(135deg, #1e40af, #3b82f6); color: #fff; }
  .avatar.f { background: linear-gradient(135deg, #be185d, #ec4899); color: #fff; }
  .sug-info { flex: 1; min-width: 0; }
  .sug-name { font-weight: 700; color: #fff; }
  .sug-meta { font-size: 0.85rem; color: #94a3b8; margin-top: 2px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* Loading */
  .loading {
    text-align: center; padding: 60px 20px;
    animation: fadeIn 0.3s;
  }
  @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
  .swim-loader {
    display: inline-block; font-size: 3rem;
    animation: swim 1.2s ease-in-out infinite;
  }
  @keyframes swim {
    0%,100% { transform: translateX(-30px) rotate(-5deg); }
    50% { transform: translateX(30px) rotate(5deg); }
  }

  /* Swimmer card */
  .swimmer-card {
    background: linear-gradient(135deg, rgba(8,40,88,0.7), rgba(8,30,68,0.7));
    backdrop-filter: blur(16px);
    border: 1px solid rgba(56,225,255,0.2);
    border-radius: 24px; padding: 32px;
    margin-bottom: 28px;
    animation: cardIn 0.5s cubic-bezier(.2,.7,.2,1);
    position: relative; overflow: hidden;
  }
  .swimmer-card::before {
    content: ''; position: absolute; top: -50%; right: -10%;
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(56,225,255,0.15), transparent 60%);
    pointer-events: none;
  }
  @keyframes cardIn { from { opacity:0; transform: translateY(20px); } to { opacity:1; transform:translateY(0); } }
  .swimmer-top { display: flex; gap: 24px; align-items: center; flex-wrap: wrap; position: relative; z-index: 1; }
  .big-avatar {
    width: 88px; height: 88px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 2rem; font-weight: 900; color: #fff;
    box-shadow: 0 8px 24px rgba(0,0,0,0.3);
    flex-shrink: 0;
  }
  .big-avatar.h { background: linear-gradient(135deg, #1e3a8a, #3b82f6); }
  .big-avatar.f { background: linear-gradient(135deg, #831843, #ec4899); }
  .swimmer-info h2 {
    font-size: 2.2rem; font-weight: 800; line-height: 1.1;
    background: linear-gradient(120deg, #fff, var(--aqua));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .swimmer-tags { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
  .tag {
    padding: 4px 12px; background: rgba(56,225,255,0.12);
    border: 1px solid rgba(56,225,255,0.3);
    border-radius: 999px; font-size: 0.85rem; color: var(--aqua); font-weight: 600;
  }
  .tag.club { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.1); color: #cbd5e1; }

  /* Stats grid */
  .stats-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 14px; margin-top: 24px; position: relative; z-index: 1;
  }
  .stat {
    background: rgba(0,0,0,0.25);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 14px; padding: 16px;
    transition: all 0.2s;
  }
  .stat:hover { transform: translateY(-3px); border-color: rgba(56,225,255,0.4); }
  .stat-label { font-size: 0.75rem; color: #94a3b8; text-transform: uppercase;
    letter-spacing: 0.08em; font-weight: 600; }
  .stat-value { font-size: 1.9rem; font-weight: 800; margin-top: 6px;
    color: var(--aqua); font-family: 'JetBrains Mono', monospace; }
  .stat-sub { font-size: 0.8rem; color: #94a3b8; margin-top: 2px; }

  /* Podium for top 3 perfs */
  .podium-section { margin-bottom: 28px; }
  .section-title {
    font-size: 1.3rem; font-weight: 800; margin-bottom: 16px;
    display: flex; align-items: center; gap: 10px;
  }
  .podium {
    display: grid; grid-template-columns: 1fr 1.2fr 1fr;
    gap: 12px; align-items: end;
  }
  .podium-place {
    background: linear-gradient(180deg, rgba(8,40,88,0.6), rgba(8,30,68,0.6));
    backdrop-filter: blur(10px);
    border-radius: 16px; padding: 18px 14px; text-align: center;
    border: 1px solid rgba(255,255,255,0.08);
    transition: all 0.25s;
    animation: podiumIn 0.6s cubic-bezier(.2,.7,.2,1) both;
  }
  .podium-place:hover { transform: translateY(-6px); }
  .podium-place.gold { border-color: var(--gold); box-shadow: 0 0 32px rgba(255,209,102,0.2); animation-delay: 0.1s; }
  .podium-place.silver { border-color: var(--silver); animation-delay: 0s; }
  .podium-place.bronze { border-color: var(--bronze); animation-delay: 0.2s; }
  @keyframes podiumIn { from { opacity:0; transform: translateY(20px); } to { opacity:1; transform:translateY(0); } }
  .medal { font-size: 2rem; margin-bottom: 4px; }
  .podium-event { font-weight: 800; font-size: 1.1rem; }
  .podium-time { font-family: 'JetBrains Mono', monospace; font-size: 1.5rem;
    color: var(--aqua); font-weight: 700; margin: 6px 0; }
  .podium-pts { color: var(--purple); font-weight: 700; font-size: 0.9rem; }
  .podium-date { color: #94a3b8; font-size: 0.78rem; margin-top: 4px; }

  /* Tabs */
  .tabs-row { display: flex; gap: 8px; margin-bottom: 18px; flex-wrap: wrap; }
  .tab {
    padding: 10px 22px; background: rgba(8,40,88,0.4);
    border: 1px solid rgba(255,255,255,0.08); border-radius: 12px;
    cursor: pointer; font-weight: 700; color: #94a3b8;
    font-family: inherit; font-size: 0.95rem;
    transition: all 0.2s;
  }
  .tab:hover { color: #fff; border-color: rgba(56,225,255,0.3); }
  .tab.active {
    background: linear-gradient(135deg, var(--aqua), var(--aqua-2));
    color: #03142e; border-color: var(--aqua);
    box-shadow: 0 6px 20px rgba(56,225,255,0.3);
  }
  .tab-count {
    display: inline-block; margin-left: 6px;
    padding: 1px 8px; background: rgba(0,0,0,0.2);
    border-radius: 999px; font-size: 0.78rem;
  }

  /* Perfs table */
  .table-wrap {
    background: rgba(8,30,68,0.5); backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 16px; overflow: hidden;
    animation: fadeIn 0.4s;
  }
  table { width: 100%; border-collapse: collapse; }
  thead th {
    background: rgba(56,225,255,0.08);
    padding: 14px 16px; text-align: left;
    font-size: 0.75rem; text-transform: uppercase;
    letter-spacing: 0.08em; color: var(--aqua); font-weight: 700;
  }
  tbody td {
    padding: 12px 16px; border-bottom: 1px solid rgba(255,255,255,0.04);
    font-size: 0.92rem;
  }
  tbody tr { transition: background 0.15s; }
  tbody tr:hover { background: rgba(56,225,255,0.05); }
  tbody tr:last-child td { border-bottom: none; }
  .stroke-pill {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 10px; border-radius: 8px; font-weight: 700;
    font-size: 0.85rem;
  }
  .stroke-NL  { background: rgba(56,189,248,0.15); color: #38bdf8; border: 1px solid rgba(56,189,248,0.3); }
  .stroke-Bra { background: rgba(167,139,250,0.15); color: #a78bfa; border: 1px solid rgba(167,139,250,0.3); }
  .stroke-Dos { background: rgba(244,114,182,0.15); color: #f472b6; border: 1px solid rgba(244,114,182,0.3); }
  .stroke-Pap { background: rgba(255,209,102,0.15); color: var(--gold); border: 1px solid rgba(255,209,102,0.3); }
  .stroke-4N  { background: rgba(74,222,128,0.15); color: #4ade80; border: 1px solid rgba(74,222,128,0.3); }
  .time { font-family: 'JetBrains Mono', monospace; font-weight: 700; color: var(--aqua); }
  .pts { color: var(--purple); font-weight: 700; }
  .lvl-DEP { color: #94a3b8; }
  .lvl-REG { color: #60a5fa; }
  .lvl-NAT, .lvl-N1, .lvl-N2 { color: var(--gold); font-weight: 700; }
  .lvl-INT { color: #f472b6; font-weight: 700; }

  /* Charts */
  .chart-card {
    background: rgba(8,30,68,0.5); backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 16px; padding: 24px;
    margin-top: 24px;
    animation: fadeIn 0.5s;
  }
  .chart-card h3 { margin-bottom: 16px; font-size: 1.1rem; font-weight: 700; }

  .charts-grid {
    display: grid; grid-template-columns: 1fr; gap: 20px;
  }
  @media (min-width: 900px) {
    .charts-grid { grid-template-columns: 1fr 1fr; }
  }

  .empty { text-align: center; padding: 50px 20px; color: #64748b; }

  /* Level badge */
  .level-badge {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 8px 16px; border-radius: 999px;
    font-weight: 800; font-size: 0.95rem;
    margin-top: 12px;
    animation: levelGlow 2.5s ease-in-out infinite;
    position: relative;
  }
  @keyframes levelGlow {
    0%,100% { box-shadow: 0 0 12px currentColor; }
    50% { box-shadow: 0 0 28px currentColor, 0 0 8px currentColor; }
  }
  .level-bronze  { background: linear-gradient(135deg, #92400e, #d97706); color: #fed7aa; }
  .level-silver  { background: linear-gradient(135deg, #475569, #94a3b8); color: #f1f5f9; }
  .level-gold    { background: linear-gradient(135deg, #b45309, #fbbf24); color: #fef3c7; }
  .level-diamond { background: linear-gradient(135deg, #0e7490, #06b6d4); color: #cffafe; }
  .level-elite   { background: linear-gradient(135deg, #6d28d9, #ec4899); color: #fce7f3; }

  /* Podium gold extra glow */
  .podium-place.gold {
    animation: podiumIn 0.6s cubic-bezier(.2,.7,.2,1) both, goldPulse 2.4s ease-in-out infinite 0.8s;
  }
  @keyframes goldPulse {
    0%,100% { box-shadow: 0 0 32px rgba(255,209,102,0.25); }
    50% { box-shadow: 0 0 48px rgba(255,209,102,0.55), 0 0 12px rgba(255,209,102,0.3); }
  }

  /* Action buttons (compare / share) */
  .actions-row {
    display: flex; gap: 10px; flex-wrap: wrap;
    margin-top: 16px; position: relative; z-index: 1;
  }
  .btn {
    padding: 10px 18px; border-radius: 12px;
    font-weight: 700; font-family: inherit; font-size: 0.92rem;
    cursor: pointer; border: 1px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.05); color: #e2e8f0;
    display: inline-flex; align-items: center; gap: 8px;
    transition: all 0.2s;
  }
  .btn:hover { background: rgba(56,225,255,0.15); border-color: var(--aqua); transform: translateY(-2px); }
  .btn-primary { background: linear-gradient(135deg, var(--aqua), var(--aqua-2)); color: #03142e; border-color: var(--aqua); }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(56,225,255,0.35); }

  /* Splits tooltip */
  .time-wrap { position: relative; display: inline-block; cursor: help; }
  .splits-tip {
    position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%) translateY(-8px);
    background: rgba(3,20,46,0.98); backdrop-filter: blur(14px);
    border: 1px solid rgba(56,225,255,0.4);
    border-radius: 10px; padding: 10px 14px;
    font-family: 'JetBrains Mono', monospace; font-size: 0.82rem;
    white-space: nowrap; pointer-events: none; z-index: 50;
    opacity: 0; transition: opacity 0.2s;
    box-shadow: 0 12px 32px rgba(0,0,0,0.5);
  }
  .time-wrap:hover .splits-tip { opacity: 1; }
  .splits-tip table { border-collapse: collapse; }
  .splits-tip td { padding: 2px 8px; border: none; font-size: 0.82rem; }
  .splits-tip .lbl { color: #38e1ff; }
  .splits-tip .cum { color: #fff; font-weight: 700; }
  .splits-tip .lap { color: #f472b6; }

  /* Skeleton loader */
  .skeleton {
    background: linear-gradient(90deg, rgba(56,225,255,0.05), rgba(56,225,255,0.15), rgba(56,225,255,0.05));
    background-size: 200% 100%;
    animation: shimmer 1.4s infinite linear;
    border-radius: 12px;
  }
  @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
  .sk-card { padding: 24px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.06); }
  .sk-line { height: 18px; margin-bottom: 12px; }
  .sk-line.lg { height: 36px; width: 60%; }
  .sk-line.md { height: 22px; width: 80%; }
  .sk-line.sm { height: 14px; width: 40%; }
  .sk-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-top: 20px; }
  .sk-stat { height: 90px; }

  /* Compare panel */
  .compare-banner {
    background: linear-gradient(135deg, rgba(167,139,250,0.15), rgba(56,225,255,0.1));
    border: 1px solid rgba(167,139,250,0.4);
    border-radius: 16px; padding: 18px 22px;
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    margin-bottom: 20px;
    animation: cardIn 0.4s;
  }
  .compare-banner strong { color: #a78bfa; }
  .compare-vs {
    font-size: 1.5rem; font-weight: 900;
    background: linear-gradient(135deg, var(--aqua), var(--pink));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }

  /* Theme light overrides */
  body.light {
    background: #e7f4fb;
    color: #0f172a;
  }
  body.light .waves { background: radial-gradient(ellipse at top, #c5e6f5, #e7f4fb 70%); }
  body.light .swimmer-card,
  body.light .table-wrap,
  body.light .chart-card,
  body.light .podium-place {
    background: rgba(255,255,255,0.65);
    border-color: rgba(56,189,248,0.3);
    color: #0f172a;
  }
  body.light .search-box { background: rgba(255,255,255,0.85); border-color: rgba(56,189,248,0.4); }
  body.light .search-box input { color: #0f172a; }
  body.light .search-box input::placeholder { color: #64748b; }
  body.light .suggestions { background: rgba(255,255,255,0.97); }
  body.light .sug-name, body.light .swimmer-info h2 { color: #0f172a; -webkit-text-fill-color: #0f172a; background: none; }
  body.light .stat { background: rgba(255,255,255,0.5); }
  body.light .tag.club { background: rgba(0,0,0,0.05); color: #475569; }

const $ = sel => document.querySelector(sel);
const search = $('#search'), suggestions = $('#suggestions'), result = $('#result');
let searchTimer = null;
const charts = {};

function strokeKey(event) {
  if (event.includes('4 N')) return '4N';
  if (event.includes('NL')) return 'NL';
  if (event.includes('Bra')) return 'Bra';
  if (event.includes('Dos')) return 'Dos';
  if (event.includes('Pap')) return 'Pap';
  return 'NL';
}
const STROKE_LABEL = { NL: 'NL', Bra: 'Brasse', Dos: 'Dos', Pap: 'Papillon', '4N': '4 Nages' };

function initials(name) {
  return name.split(/\s+/).filter(Boolean).slice(0, 2).map(w => w[0]).join('').toUpperCase();
}

search.addEventListener('input', e => {
  clearTimeout(searchTimer);
  const q = e.target.value.trim();
  if (q.length < 3) { suggestions.classList.remove('active'); return; }
  searchTimer = setTimeout(() => doSearch(q), 350);
});

async function doSearch(q) {
  try {
    const r = await fetch('/api/search?q=' + encodeURIComponent(q));
    const data = await r.json();
    if (!Array.isArray(data) || data.length === 0) {
      suggestions.innerHTML = '<div class="suggestion"><div class="sug-info"><div class="sug-meta">Aucun nageur trouvé pour "' + q + '"</div></div></div>';
      suggestions.classList.add('active');
      return;
    }
    suggestions.innerHTML = data.map(s => `
      <div class="suggestion" data-iuf="${s.iuf}" data-name="${s.name}" data-sex="${s.sex}" data-year="${s.year}" data-club="${s.club}">
        <div class="avatar ${s.sex === 'F' ? 'f' : 'h'}">${initials(s.name)}</div>
        <div class="sug-info">
          <div class="sug-name">${s.name}</div>
          <div class="sug-meta">${s.year ? '('+s.year+')' : ''} · ${s.club || '—'}</div>
        </div>
      </div>`).join('');
    suggestions.classList.add('active');
    suggestions.querySelectorAll('.suggestion').forEach(el => {
      el.addEventListener('click', () => {
        const d = el.dataset;
        loadSwimmer(d.iuf, { iuf: d.iuf, name: d.name, sex: d.sex, year: d.year, club: d.club });
        suggestions.classList.remove('active');
        search.value = d.name;
      });
    });
  } catch (err) {
    suggestions.innerHTML = '<div class="suggestion"><div class="sug-info"><div class="sug-meta">Erreur : ' + err.message + '</div></div></div>';
    suggestions.classList.add('active');
  }
}

document.addEventListener('click', e => {
  if (!e.target.closest('.search-wrap')) suggestions.classList.remove('active');
});

// === Persistence localStorage ===
const STORAGE_FAV = 'nageurstats:favs';
const STORAGE_RECENT = 'nageurstats:recent';
const STORAGE_THEME = 'nageurstats:theme';

function getFavs() { try { return JSON.parse(localStorage.getItem(STORAGE_FAV)) || []; } catch { return []; } }
function setFavs(arr) { localStorage.setItem(STORAGE_FAV, JSON.stringify(arr.slice(0, 30))); }
function isFav(iuf) { return getFavs().some(s => s.iuf === iuf); }
function toggleFav(meta) {
  const list = getFavs();
  const i = list.findIndex(s => s.iuf === meta.iuf);
  if (i >= 0) list.splice(i, 1); else list.unshift(meta);
  setFavs(list);
  return i < 0;
}
function getRecent() { try { return JSON.parse(localStorage.getItem(STORAGE_RECENT)) || []; } catch { return []; } }
function pushRecent(meta) {
  const list = getRecent().filter(s => s.iuf !== meta.iuf);
  list.unshift(meta);
  localStorage.setItem(STORAGE_RECENT, JSON.stringify(list.slice(0, 8)));
}

// === Achievements engine ===
function computeAchievements(mpp25, mpp50) {
  const all = [...mpp25, ...mpp50];
  if (!all.length) return [];
  const strokes = new Set(all.map(p => strokeKey(p.event)));
  const has = (cond) => all.some(cond);
  const now = Date.now();
  const oneYear = 365 * 86400000;
  const recentPB = all.filter(p => {
    const d = p.date.match(/(\d+)\/(\d+)\/(\d+)/);
    if (!d) return false;
    return now - new Date(+d[3], +d[2]-1, +d[1]).getTime() < oneYear;
  });
  const oldestTs = Math.min(...all.map(p => {
    const d = p.date.match(/(\d+)\/(\d+)\/(\d+)/);
    return d ? new Date(+d[3], +d[2]-1, +d[1]).getTime() : now;
  }));
  return [
    { id: 'first', icon: '🥇', title: 'Premier PB', desc: 'Au moins 1 record perso', got: all.length >= 1 },
    { id: '10pb', icon: '🎖️', title: 'Carnet bien rempli', desc: '10 PB ou plus', got: all.length >= 10 },
    { id: 'multi', icon: '🌈', title: 'Caméléon', desc: 'PB dans les 5 nages (NL, Bra, Dos, Pap, 4N)', got: strokes.size >= 5 },
    { id: 'sub30', icon: '⚡', title: 'Sub-30', desc: '50 NL sous les 30 secondes', got: has(p => p.event === '50 NL' && p.seconds < 30) },
    { id: 'sub60', icon: '🚀', title: 'Sub-minute', desc: '100 NL sous la minute', got: has(p => p.event === '100 NL' && p.seconds < 60) },
    { id: 'long', icon: '🌊', title: 'Marathonien', desc: 'A nagé du 800 ou 1500 NL', got: has(p => /^(800|1500) NL/.test(p.event)) },
    { id: '1000', icon: '💎', title: 'Mille points', desc: 'Au moins 1 perf ≥ 1000 pts', got: has(p => p.points >= 1000) },
    { id: 'elite', icon: '👑', title: 'Niveau Élite', desc: 'Une perf ≥ 1100 pts', got: has(p => p.points >= 1100) },
    { id: 'fresh', icon: '🔥', title: 'En forme', desc: 'PB battu cette saison', got: recentPB.length >= 1 },
    { id: 'streak', icon: '⚡', title: 'Série en feu', desc: '3+ PB dans les 12 derniers mois', got: recentPB.length >= 3 },
    { id: 'vet', icon: '🏛️', title: 'Vétéran', desc: 'PB le plus ancien > 5 ans', got: (now - oldestTs) > 5*oneYear },
    { id: 'nat', icon: '🏆', title: 'Nationaux atteints', desc: 'Au moins 1 perf en niveau NAT/N1/N2/INT', got: has(p => /NAT|N1|N2|INT/.test(p.level)) },
    { id: 'twoPools', icon: '🏊', title: 'Deux bassins', desc: 'Records en 25m ET 50m', got: mpp25.length > 0 && mpp50.length > 0 },
  ];
}

const LEVEL_TIERS = [
  { name: 'BRONZE', min: 0,    max: 700,  cls: 'level-bronze',  icon: '🥉' },
  { name: 'ARGENT', min: 700,  max: 850,  cls: 'level-silver',  icon: '🥈' },
  { name: 'OR',     min: 850,  max: 1000, cls: 'level-gold',    icon: '🥇' },
  { name: 'DIAMANT',min: 1000, max: 1100, cls: 'level-diamond', icon: '💎' },
  { name: 'ÉLITE',  min: 1100, max: 1300, cls: 'level-elite',   icon: '👑' },
];
function xpProgress(pts) {
  const tier = LEVEL_TIERS.find(t => pts >= t.min && pts < t.max) || LEVEL_TIERS[LEVEL_TIERS.length-1];
  const pct = Math.min(100, ((pts - tier.min) / (tier.max - tier.min)) * 100);
  const next = LEVEL_TIERS[LEVEL_TIERS.indexOf(tier)+1];
  return { tier, pct, nextLabel: next ? `→ ${next.name} à ${next.min} pts` : 'Maximum atteint 🏆' };
}

// === Sparkline / progress bar ===
function ptsBar(points, max=1200) {

    <span style="width:60px;height:6px;background:rgba(255,255,255,0.08);border-radius:999px;overflow:hidden;display:inline-block">
      <span style="display:block;height:100%;width:${pct}%;background:linear-gradient(90deg,var(--aqua),var(--pink));border-radius:999px"></span>

}

document.querySelectorAll('.nav-item').forEach(btn => {
  btn.addEventListener('click', () => {
    const action = btn.dataset.nav;

    switch(action) {
      case 'home':
        const url = new URL(window.location);
        url.searchParams.delete('iuf'); url.searchParams.delete('name');
        window.history.replaceState({}, '', url);
        document.querySelector('#search').value = '';

      case 'favs':

        renderHome();

          const sel = action === 'favs' ? '⭐ Tes favoris' : '🕒 Récemment';
          const titles = document.querySelectorAll('.hero-section-title');
          for (const t of titles) {
            if (t.textContent.includes(sel.replace(/[^\w]/g, ''))) {

            }
          }

        break;
      case 'search':
        document.querySelector('#search').focus();
        window.scrollTo({ top: 0, behavior: 'smooth' });
        break;
      case 'theme':
        applyTheme(document.body.classList.contains('light') ? 'dark' : 'light');

      case 'share':
        if (navigator.share) {
          navigator.share({ title: 'NageurStats', text: 'Tracker FFN — toute la carrière de tes nageurs préférés', url: window.location.origin });
        } else {
          navigator.clipboard.writeText(window.location.origin);

      case 'about':

  result.innerHTML = `

      <div class="sk-line md skeleton"></div><div class="sk-line skeleton"></div></div>`;
  try {

function getLevel(pts) {
  if (pts >= 1100) return { name: 'ÉLITE', cls: 'level-elite', icon: '👑' };
  if (pts >= 1000) return { name: 'DIAMANT', cls: 'level-diamond', icon: '💎' };
  if (pts >= 850)  return { name: 'OR', cls: 'level-gold', icon: '🥇' };
  if (pts >= 700)  return { name: 'ARGENT', cls: 'level-silver', icon: '🥈' };
  return { name: 'BRONZE', cls: 'level-bronze', icon: '🥉' };
}

function fmtNum(n) {
  return Number(n).toLocaleString('fr-FR'); // 1095 -> "1 095"
}

function animateCounter(el, target, duration = 1400) {
  const start = performance.now();
  const from = 0;
  const ease = t => 1 - Math.pow(1 - t, 3);
  function tick(now) {
    const t = Math.min(1, (now - start) / duration);
    const v = Math.round(from + (target - from) * ease(t));
    el.textContent = fmtNum(v);
    if (t < 1) requestAnimationFrame(tick);
    else el.textContent = fmtNum(target);
  }
  requestAnimationFrame(tick);
}

// Spotlight curseur (suit la souris sur les cartes)
document.addEventListener('mousemove', e => {
  document.querySelectorAll('.spotlight').forEach(card => {
    const r = card.getBoundingClientRect();
    const mx = e.clientX - r.left, my = e.clientY - r.top;
    if (mx >= 0 && my >= 0 && mx <= r.width && my <= r.height) {
      card.style.setProperty('--mx', mx + 'px');
      card.style.setProperty('--my', my + 'px');
    }
  });
});

// Tilt 3D (suit la souris en perspective)
function attachTilt(el) {
  if (!el || el._tiltBound) return;
  el._tiltBound = true;
  el.style.transformStyle = 'preserve-3d';
  el.parentElement && (el.parentElement.style.perspective = '1200px');
  el.addEventListener('mousemove', e => {
    const r = el.getBoundingClientRect();
    const cx = (e.clientX - r.left) / r.width - 0.5;
    const cy = (e.clientY - r.top) / r.height - 0.5;
    el.style.transform = `rotateY(${cx * 6}deg) rotateX(${-cy * 5}deg) translateZ(0)`;
  });
  el.addEventListener('mouseleave', () => {
    el.style.transform = 'rotateY(0deg) rotateX(0deg)';
  });
}

// Pluie de particules dorées (Élite)
function rainGold(duration = 3500) {
  const symbols = ['✦','✧','★','✨','◆'];
  const end = performance.now() + duration;
  function spawn() {
    if (performance.now() > end) return;
    const p = document.createElement('div');
    p.className = 'gold-particle';
    p.textContent = symbols[Math.floor(Math.random()*symbols.length)];
    p.style.left = Math.random() * 100 + 'vw';
    p.style.fontSize = (10 + Math.random() * 14) + 'px';
    p.style.animationDuration = (3 + Math.random() * 3) + 's';
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 6000);
    setTimeout(spawn, 80 + Math.random() * 140);
  }
  spawn();
}

function fireConfetti() {
  if (typeof confetti !== 'function') return;
  const colors = ['#38e1ff', '#a78bfa', '#ffd166', '#f472b6'];
  confetti({ particleCount: 80, spread: 75, origin: { y: 0.3 }, colors });

function dateToTs(d) {
  const m = d.match(/(\d+)\/(\d+)\/(\d+)/);
  if (!m) return 0;
  return new Date(+m[3], +m[2]-1, +m[1]).getTime();
}

  document.querySelector('#panel-content').innerHTML = `
    <div class="panel-section">
      <h4>🏅 Succès débloqués <span class="tag" style="margin-left:6px">${unlocked}/${achievements.length}</span></h4>
      <div class="ach-grid">
        ${achievements.map((x,i) => `
          <div class="ach ${x.got?'unlocked':'locked'}" style="animation-delay:${i*30}ms">
            <div class="ach-icon">${x.icon}</div>
            <div class="ach-info">
              <div class="ach-title">${x.title}</div>
              <div class="ach-desc">${x.desc}</div>
            </div>
          </div>`).join('')}
      </div>
    </div>

    <div class="panel-section">
      <h4>📊 Stats détaillées</h4>
      <div class="panel-mini-stat"><span class="lbl">Total courses (BDD FFN)</span><span class="val">${fmtNum(a.total_perfs_db || 0)}</span></div>
      <div class="panel-mini-stat"><span class="lbl">Records bassin 25m</span><span class="val">${mpp25.length}</span></div>
      <div class="panel-mini-stat"><span class="lbl">Records bassin 50m</span><span class="val">${mpp50.length}</span></div>
      <div class="panel-mini-stat"><span class="lbl">PB cette saison</span><span class="val">🔥 ${recentPbCount}</span></div>
      <div class="panel-mini-stat"><span class="lbl">Top score</span><span class="val">${fmtNum(a.best_points)} pts</span></div>
      <div class="panel-mini-stat"><span class="lbl">Moyenne</span><span class="val">${fmtNum(a.avg_points)} pts</span></div>
      ${oldestPb ? `<div class="panel-mini-stat"><span class="lbl">Plus ancien PB</span><span class="val">${oldestPb.date}</span></div>` : ''}
    </div>

    <div class="panel-section">
      <h4>🏆 Répartition par niveau</h4>
      ${levelLines || '<div style="color:#94a3b8">Aucune donnée</div>'}
    </div>

    <div class="panel-section">
      <h4>🕒 Derniers PB</h4>
      ${recentPbs.map(p => `
        <div class="panel-mini-stat">
          <span><span class="stroke-pill stroke-${strokeKey(p.event)}">${p.event}</span> ${p.date}</span>
          <span class="val">${p.time}</span>
        </div>`).join('')}
    </div>

    <div class="panel-section">
      <h4>📍 Villes des courses</h4>
      <div style="display:flex;flex-wrap:wrap;gap:6px">
        ${cities.map(c => `<span class="tag club">${c}</span>`).join('')}
      </div>
    </div>
  `;
  document.querySelector('#side-toggle').classList.add('visible');

  // === Doughnut : répartition par nage ===
  const strokeCounts = { NL:0, Bra:0, Dos:0, Pap:0, '4N':0 };
  allMpp.forEach(p => strokeCounts[strokeKey(p.event)]++);
  charts.doughnut = new Chart($('#chart-doughnut').getContext('2d'), {
    type: 'doughnut',
    data: {
      labels: ['NL', 'Bra', 'Dos', 'Pap', '4N'].map(k => STROKE_LABEL[k]),
      datasets: [{
        data: ['NL','Bra','Dos','Pap','4N'].map(k => strokeCounts[k]),
        backgroundColor: ['#38bdf8', '#a78bfa', '#f472b6', '#ffd166', '#4ade80'],
        borderColor: 'rgba(0,0,0,0.3)', borderWidth: 2,
      }]
    },
    options: {
      responsive: true, cutout: '60%',
      plugins: { legend: { position: 'bottom', labels: { color: '#cbd5e1', font: {weight: 600} } } }
    }
  });

  // === Vitesse m/s : pour chaque MPP, vitesse = distance / seconds ===
  const speedData = allMpp
    .map(p => {
      const dm = p.event.match(/^(\d+)/);
      const dist = dm ? parseInt(dm[1]) : 0;
      return { event: p.event, speed: p.seconds ? dist / p.seconds : 0, points: p.points };
    })
    .filter(x => x.speed > 0)
    .sort((a,b) => b.speed - a.speed)
    .slice(0, 12);
  charts.speed = new Chart($('#chart-speed').getContext('2d'), {
    type: 'bar',
    data: {
      labels: speedData.map(d => d.event),
      datasets: [{
        label: 'm/s', data: speedData.map(d => +d.speed.toFixed(2)),
        backgroundColor: speedData.map(d => {
          const sk = strokeKey(d.event);
          return { NL:'#38bdf8', Bra:'#a78bfa', Dos:'#f472b6', Pap:'#ffd166', '4N':'#4ade80' }[sk];
        }),
        borderRadius: 6,
      }]
    },
    options: chartOpts('m/s')
  });

  // === Heatmap : courses par mois sur 5 ans ===
  const counts = {};
  allMpp.forEach(p => {
    const d = p.date.match(/(\d+)\/(\d+)\/(\d+)/);
    if (!d) return;
    const k = d[3] + '-' + d[2].padStart(2, '0');
    counts[k] = (counts[k] || 0) + 1;
  });
  const years = [...new Set(Object.keys(counts).map(k => k.split('-')[0]))].sort().slice(-5);
  if (years.length) {
    const monthsAbbr = ['Jan','Fév','Mar','Avr','Mai','Juin','Juil','Août','Sep','Oct','Nov','Déc'];
    let html = `<div class="heatmap-month-row"><div></div>${monthsAbbr.map(m => `<div style="text-align:center">${m}</div>`).join('')}</div>`;
    years.forEach(y => {
      html += `<div class="heatmap"><div class="heatmap-row-label">${y}</div>`;
      for (let m = 1; m <= 12; m++) {
        const c = counts[`${y}-${String(m).padStart(2,'0')}`] || 0;
        const lvl = c === 0 ? 0 : c <= 1 ? 1 : c <= 2 ? 2 : c <= 4 ? 3 : 4;
        html += `<div class="heatmap-cell" data-c="${lvl}" title="${y}/${String(m).padStart(2,'0')} : ${c} course${c>1?'s':''}"></div>`;
      }
      html += `</div>`;
    });
    document.querySelector('#heatmap').innerHTML = html;
  } else {
    document.querySelector('#heatmap').innerHTML = '<div class="empty">Pas assez de données</div>';
  }

  charts.progression = new Chart($('#chart-progression').getContext('2d'), {
    type: 'line',
    data: {
      labels: monthKeys,
      datasets: [{
        label: 'Meilleur score du mois',
        data: monthKeys.map(k => byMonth[k]),
        borderColor: '#38e1ff', backgroundColor: 'rgba(56,225,255,0.15)',
        fill: true, tension: 0.35, pointBackgroundColor: '#38e1ff',
        pointBorderColor: '#fff', pointBorderWidth: 2, pointRadius: 4
      }]
    },
    options: chartOpts('Points FFN')
  });
}

function bestByStroke(mpp) {
  const out = { NL:0, Bra:0, Dos:0, Pap:0, '4N':0 };
  mpp.forEach(p => { const k = strokeKey(p.event); if (p.points > out[k]) out[k] = p.points; });
  return out;
}

function renderCompare(s1, s2) {
  Object.values(charts).forEach(c => c && c.destroy());
  const STROKES = ['NL', 'Bra', 'Dos', 'Pap', '4N'];

  const all1 = [...(s1.data.pools['25'].mpp||[]), ...(s1.data.pools['50'].mpp||[])];
  const all2 = [...(s2.data.pools['25'].mpp||[]), ...(s2.data.pools['50'].mpp||[])];
  const r1 = bestByStroke(all1), r2 = bestByStroke(all2);

  // Score battle: pour chaque nage, qui gagne
  const wins1 = STROKES.filter(s => r1[s] > r2[s]).length;
  const wins2 = STROKES.filter(s => r2[s] > r1[s]).length;
  const winnerName = wins1 > wins2 ? s1.meta.name : (wins2 > wins1 ? s2.meta.name : 'Égalité');

  const a1 = s1.data.analysis, a2 = s2.data.analysis;

  result.innerHTML = `
    <div class="swimmer-card tiltable spotlight">
      <div style="text-align:center;margin-bottom:24px;position:relative;z-index:1">
        <div style="font-size:1rem;color:#94a3b8;letter-spacing:0.1em;text-transform:uppercase;font-weight:700">⚔️ Battle</div>
        <div style="font-size:1.6rem;font-weight:800;margin-top:6px">${s1.meta.name} <span style="color:#a78bfa;margin:0 12px">VS</span> ${s2.meta.name}</div>
        <div style="margin-top:14px"><span class="tag" style="font-size:1rem;padding:8px 18px">🏆 Vainqueur : <strong style="margin-left:4px;color:#ffd166">${winnerName}</strong> (${Math.max(wins1, wins2)}/${STROKES.length} nages)</span></div>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;position:relative;z-index:1">
        <div class="stat" style="text-align:center">
          <div class="big-avatar ${s1.meta.sex==='F'?'f':'h'}" style="margin:0 auto 12px">${initials(s1.meta.name)}</div>
          <div style="font-weight:800;font-size:1.1rem">${s1.meta.name}</div>
          <div class="stat-value" style="margin-top:8px">${a1?a1.best_points:0}</div>
          <div class="stat-sub">top score · ${a1?a1.total_events:0} épreuves</div>
        </div>
        <div class="stat" style="text-align:center">
          <div class="big-avatar ${s2.meta.sex==='F'?'f':'h'}" style="margin:0 auto 12px">${initials(s2.meta.name)}</div>
          <div style="font-weight:800;font-size:1.1rem">${s2.meta.name}</div>
          <div class="stat-value" style="margin-top:8px;color:#a78bfa">${a2?a2.best_points:0}</div>
          <div class="stat-sub">top score · ${a2?a2.total_events:0} épreuves</div>
        </div>
      </div>

      <div class="actions-row" style="justify-content:center">
        <button class="btn" id="btn-back">← Retour fiche solo</button>
      </div>
    </div>

    <div class="chart-card">
      <h3>🕷️ Radar comparé — points max par nage</h3>
      <canvas id="chart-vs-radar"></canvas>
    </div>

    <div class="chart-card" style="margin-top:20px">
      <h3>📊 Bataille par nage</h3>
      <canvas id="chart-vs-bar"></canvas>
    </div>
  `;

  charts.vsRadar = new Chart($('#chart-vs-radar').getContext('2d'), {
    type: 'radar',
    data: {
      labels: STROKES.map(s => STROKE_LABEL[s]),
      datasets: [
        { label: s1.meta.name, data: STROKES.map(s => r1[s]),
          backgroundColor: 'rgba(56,225,255,0.25)', borderColor: '#38e1ff',
          borderWidth: 2, pointBackgroundColor: '#38e1ff', pointRadius: 5 },
        { label: s2.meta.name, data: STROKES.map(s => r2[s]),
          backgroundColor: 'rgba(244,114,182,0.25)', borderColor: '#f472b6',
          borderWidth: 2, pointBackgroundColor: '#f472b6', pointRadius: 5 },
      ]
    },
    options: {
      responsive: true,
      plugins: { legend: { labels: { color: '#cbd5e1', font: { weight: 700 } } } },
      scales: {
        r: { beginAtZero: true,
          angleLines: { color: 'rgba(56,225,255,0.15)' },
          grid: { color: 'rgba(56,225,255,0.1)' },
          pointLabels: { color: '#e2e8f0', font: { size: 13, weight: 700 } },
          ticks: { color: '#64748b', backdropColor: 'transparent' } }
      }
    }
  });

  charts.vsBar = new Chart($('#chart-vs-bar').getContext('2d'), {
    type: 'bar',
    data: {
      labels: STROKES.map(s => STROKE_LABEL[s]),
      datasets: [
        { label: s1.meta.name, data: STROKES.map(s => r1[s]),
          backgroundColor: 'rgba(56,225,255,0.7)', borderRadius: 6 },
        { label: s2.meta.name, data: STROKES.map(s => r2[s]),
          backgroundColor: 'rgba(244,114,182,0.7)', borderRadius: 6 },
      ]
    },
    options: chartOpts('Points FFN max')
  });

  document.querySelector('#btn-back').addEventListener('click', () => {
    renderSwimmer(s1.data, s1.meta);
  });

  search.placeholder = 'Léon Marchand, Marchand Léon, ou juste Marchand...';
  fireConfetti();
}

function chartOpts(yLabel) {
  return {
    responsive: true,
    plugins: {
      legend: { labels: { color: '#cbd5e1', font: { weight: 600 } } },
      tooltip: {
        backgroundColor: 'rgba(3,20,46,0.95)',
        borderColor: 'rgba(56,225,255,0.3)', borderWidth: 1,
        padding: 12, titleColor: '#38e1ff', bodyColor: '#fff'
      }
    },
    scales: {
      x: { ticks: { color: '#94a3b8' }, grid: { color: 'rgba(255,255,255,0.04)' } },
      y: { ticks: { color: '#94a3b8' }, grid: { color: 'rgba(255,255,255,0.04)' },
        title: { display: true, text: yLabel, color: '#94a3b8', font: {weight: 600} } }
    }
  };
}
</script>
</body>
</html>
